<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Enlace de Validación</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* --- TEMA: MIDNIGHT / CYBER DASHBOARD --- */
        :root {
            --bg-page: #020617; 
            --bg-card: #0f172a; 
            --bg-input: #1e293b; 
            --text-main: #f8fafc; 
            --text-label: #94a3b8; 
            --accent: #00e5ff; 
            --accent-hover: #00b8cc;
            --border-color: #334155;
            --success: #10b981; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-page) 0%, #0a0f1c 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            min-height: 100vh;
            margin: 0;
            padding: 40px 15px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 880px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: var(--text-main);
            margin-top: 0;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        h2 span {
            color: var(--accent);
        }

        .header-img {
            display: block;
            margin: 0 auto 35px auto;
            max-width: 100%;
            height: auto;
            max-height: 120px;
        }

        .section-title {
            grid-column: 1 / -1; 
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 20px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 18px 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        label {
            margin-bottom: 6px;
            color: var(--text-label);
            font-size: 13px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            color: var(--text-main);
            background-color: var(--bg-input);
            transition: all 0.3s ease;
            color-scheme: dark;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            background-color: #172033;
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.15);
        }

        input::placeholder {
            color: #475569;
        }

        /* --- ESTILOS DEL BOTÓN BUSCAR CURP CHICO --- */
        .btn-small {
            background-color: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 6px;
            padding: 8px 15px;
            margin-top: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.2s;
            width: fit-content;
        }
        .btn-small:hover:not(:disabled) {
            background-color: var(--accent);
            color: #000;
        }
        .btn-small:disabled {
            border-color: var(--border-color);
            color: #475569;
            cursor: not-allowed;
        }
        .curp-status {
            font-size: 12px;
            margin-top: 5px;
            font-weight: 600;
        }
        /* ------------------------------------------- */

        .action-container {
            margin-top: 40px;
            text-align: center;
        }

        button.btn-generate {
            width: 100%;
            max-width: 350px;
            padding: 15px;
            background: linear-gradient(90deg, #0072ff 0%, var(--accent) 100%);
            color: #000; 
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s, background 0.3s, color 0.3s;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
        }

        button.btn-generate:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 229, 255, 0.5);
        }

        button.btn-generate:active:not(:disabled) {
            transform: translateY(1px);
        }

        button.btn-generate:disabled {
            background: #334155; 
            color: #64748b; 
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .result-container {
            margin-top: 30px;
            display: none;
            padding: 25px;
            background-color: rgba(0, 229, 255, 0.05);
            border: 1px dashed var(--accent);
            border-radius: 8px;
            word-break: break-all;
            text-align: center;
        }

        .result-container p {
            margin: 0 0 15px 0;
            color: var(--text-main);
            font-weight: 600;
        }

        .result-container a {
            color: var(--accent);
            text-decoration: none;
            font-size: 13px;
            display: block;
            margin-bottom: 20px;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .result-container a:hover {
            background: rgba(0,0,0,0.5);
            text-decoration: underline;
        }

        .btn-copy {
            background-color: transparent;
            color: var(--success);
            border: 1px solid var(--success);
            height: 40px;
            padding: 0 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            margin-bottom: 20px; 
        }

        .btn-copy:hover {
            background-color: var(--success);
            color: #000;
        }

        .qr-wrapper {
            background-color: #ffffff; 
            padding: 15px;
            border-radius: 8px;
            display: inline-block;
            margin: 0 auto 20px auto;
        }

        .btn-download {
            background-color: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            height: 40px;
            padding: 0 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            display: block;
            margin: 0 auto;
        }

        .btn-download:hover {
            background-color: var(--accent);
            color: #000;
        }

        .curp-error-box {
            display: none;
            background-color: rgba(239, 68, 68, 0.1); 
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: fadeIn 0.3s ease;
        }

        /* --- NUEVO ESTILO PARA ÉXITO --- */
        .curp-success-box {
            display: none;
            background-color: rgba(16, 185, 129, 0.1); 
            border: 1px solid var(--success);
            color: var(--success);
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Panel de <span>Encriptación</span></h2>
    
    <img src="https://i.postimg.cc/bJcbdy1N/1772507217379.png" alt="Logo de Sistema" class="header-img">

    <div class="form-grid">
        <div class="section-title">Datos de Identificación</div>
        
        <div class="form-group">
            <label for="rfc">RFC</label>
            <input type="text" id="rfc" placeholder="Se generará en automático" style="text-transform: uppercase;">
        </div>

        <div class="form-group">
            <label for="curp">CURP</label>
            <input type="text" id="curp" placeholder="Ingresa la CURP" maxlength="18" onclick="mostrarBotonCurp()" oninput="validarCurpLength()" style="text-transform: uppercase;">
            <button type="button" id="btnBuscarCurp" class="btn-small" style="display: none;" onclick="extraerDatosCurp()" disabled>Buscar Datos</button>
        </div>
        
        <div class="form-group">
            <label for="validarCurp">Validar CURP</label>
            <input type="text" id="validarCurp" placeholder="Esperando consulta..." readonly style="font-weight: 700; transition: color 0.3s, border-color 0.3s;">
        </div>
        <div class="form-group">
            <label for="nombre">Nombre(s)</label>
            <input type="text" id="nombre" placeholder="Ingresa el nombre">
        </div>
        <div class="form-group">
            <label for="apellidoPaterno">Apellido Paterno</label>
            <input type="text" id="apellidoPaterno" placeholder="Ingresa el apellido paterno">
        </div>
        <div class="form-group">
            <label for="apellidoMaterno">Apellido Materno</label>
            <input type="text" id="apellidoMaterno" placeholder="Ingresa el apellido materno">
        </div>
        <div class="form-group">
            <label for="fechaNacimiento">Fecha Nacimiento</label>
            <input type="date" id="fechaNacimiento">
        </div>

        <div class="section-title">Estatus</div>

        <div class="form-group">
            <label for="fechaInicioOperaciones">Fecha de inicio de operaciones</label>
            <input type="date" id="fechaInicioOperaciones">
        </div>
        <div class="form-group">
            <label for="situacionContribuyente">Situación del contribuyente</label>
            <select id="situacionContribuyente">
                <option value="" disabled selected>Selecciona una situación...</option>
                <option value="ACTIVO">ACTIVO</option>
                <option value="SUSPENDIDO">SUSPENDIDO</option>
                <option value="REACTIVADO">REACTIVADO</option>
                <option value="CANCELADO">CANCELADO</option>
            </select>
        </div>
        <div class="form-group">
            <label for="fechaUltimoCambio">Fecha de último cambio de situación</label>
            <input type="date" id="fechaUltimoCambio">
        </div>

        <div class="section-title">Datos de Ubicación</div>

        <div class="form-group">
            <label for="entidadFederativa">Entidad federativa</label>
            <input type="text" id="entidadFederativa" placeholder="Ingresa la entidad">
        </div>
        <div class="form-group">
            <label for="municipioDelegacion">Municipio / Delegación</label>
            <input type="text" id="municipioDelegacion" placeholder="Ingresa el municipio">
        </div>
        <div class="form-group">
            <label for="colonia">Colonia</label>
            <select id="colonia">
                <option value="">Ingresa un CP primero...</option>
            </select>
        </div>
        <div class="form-group">
            <label for="tipoVialidad">Tipo de vialidad</label>
            <select id="tipoVialidad">
                <option value="" disabled selected>Selecciona una opción...</option>
                <option value="CALLE">Calle</option>
                <option value="AVENIDA">Avenida</option>
                <option value="BULEVAR">Bulevar</option>
                <option value="CALZADA">Calzada</option>
                <option value="PRIVADA">Privada</option>
                <option value="CERRADA">Cerrada</option>
                <option value="CIRCUITO">Circuito</option>
                <option value="RETORNO">Retorno</option>
                <option value="CALLEJON">Callejón</option>
                <option value="ANDADOR">Andador</option>
                <option value="CAMINO">Camino</option>
                <option value="CARRETERA">Carretera</option>
                <option value="PROLONGACION">Prolongación</option>
                <option value="VIADUCTO">Viaducto</option>
            </select>
        </div>
        <div class="form-group">
            <label for="nombreVialidad">Nombre de la vialidad</label>
            <input type="text" id="nombreVialidad" placeholder="Ingresa el nombre">
        </div>
        <div class="form-group">
            <label for="numeroExterior">Número exterior</label>
            <input type="text" id="numeroExterior" placeholder="Ej. 299">
        </div>
        <div class="form-group">
            <label for="numeroInterior">Número interior</label>
            <input type="text" id="numeroInterior" placeholder="(Opcional)">
        </div>
        <div class="form-group">
            <label for="cp">Código Postal (CP)</label>
            <input type="text" id="cp" placeholder="Ej. 97784" maxlength="5" oninput="buscarCP()">
            <div id="statusCp" class="curp-status" style="display: none;"></div>
        </div>
        <div class="form-group">
            <label for="correoElectronico">Correo electrónico</label>
            <input type="email" id="correoElectronico" placeholder="usuario@correo.com">
        </div>
        <div class="form-group">
            <label for="al">AL</label>
            <input type="text" id="al" placeholder="Ej. YUCATÁN 1">
        </div>

        <div class="section-title">Características Fiscales</div>

        <div class="form-group">
            <label for="regimen">Régimen</label>
            <select id="regimen">
                <option value="" disabled selected>Selecciona un régimen...</option>
                <option value="605 - SUELDOS Y SALARIOS">605 - Sueldos y Salarios</option>
                <option value="626 - REGIMEN SIMPLIFICADO DE CONFIANZA">626 - Régimen Simplificado de Confianza (RESICO)</option>
                <option value="612 - ACTIVIDADES EMPRESARIALES Y PROFESIONALES">612 - Actividades Empresariales y Profesionales</option>
                <option value="621 - INCORPORACION FISCAL">621 - Incorporación Fiscal (RIF)</option>
                <option value="606 - ARRENDAMIENTO">606 - Arrendamiento</option>
                <option value="608 - ENAJENACION DE BIENES">608 - Enajenación de bienes</option>
                <option value="614 - INGRESOS POR INTERESES">614 - Ingresos por Intereses</option>
                <option value="611 - INGRESOS POR DIVIDENDOS">611 - Ingresos por Dividendos</option>
                <option value="616 - SIN OBLIGACIONES FISCALES">616 - Sin obligaciones fiscales</option>
            </select>
        </div>
        <div class="form-group">
            <label for="fechaAlta">Fecha de alta (Régimen)</label>
            <input type="date" id="fechaAlta">
        </div>
    </div>

    <div class="action-container">
        <button id="btnGenerar" class="btn-generate" onclick="generarEnlace()" disabled>Generar Enlace Seguro</button>
    </div>

    <div class="result-container" id="resultadoArea">
        <p>✓ Datos Codificados con Éxito</p>
        <a href="#" id="enlaceGenerado" target="_blank"></a>
        <button class="btn-copy" onclick="copiarAlPortapapeles()">[ Copiar Enlace ]</button>
        
        <div id="codigoQR" class="qr-wrapper"></div>
        <button class="btn-download" id="btnDescargar" onclick="descargarQR()" style="display: none;">[ Descargar QR ]</button>
    </div>
</div>

<script>
    // --- LÓGICA DE BÚSQUEDA DE CURP ---
    function mostrarBotonCurp() {
        document.getElementById('btnBuscarCurp').style.display = 'block';
    }

    function validarCurpLength() {
        const input = document.getElementById('curp');
        input.value = input.value.toUpperCase(); // Forzar mayúsculas
        const btn = document.getElementById('btnBuscarCurp');
        
        // Solo habilita el botón de buscar si tiene 18 letras/números
        if(input.value.trim().length === 18) {
            btn.disabled = false;
        } else {
            btn.disabled = true;
        }
        revisarCampos(); // Avisamos al vigilante principal
    }

       async function extraerDatosCurp() {
        const curp = document.getElementById('curp').value.trim();
        const btn = document.getElementById('btnBuscarCurp');
        const campoValidacion = document.getElementById('validarCurp');
        
        btn.disabled = true;
        // Estado de carga en el nuevo campo
        campoValidacion.value = '⏳ Conectando con RENAPO...';
        campoValidacion.style.color = 'var(--accent)';
        campoValidacion.style.borderColor = 'var(--accent)';

        try {
            const urlApi = 'https://api-curp.onrender.com/scrape-curp?curp=' + curp;            
            const respuesta = await fetch(urlApi);
            const datos = await respuesta.json();

            if (!respuesta.ok) {
                if (datos.error === 'CURP_NO_EXISTENTE') {
                    throw new Error('CURP_NO_EXISTENTE');
                }
                throw new Error(datos.error || 'No se encontró información');
            }

            if(datos.nombre && datos.nombre !== 'No encontrado') {
                document.getElementById('nombre').value = datos.nombre;
            }
            if(datos.primerApellido && datos.primerApellido !== 'No encontrado') {
                document.getElementById('apellidoPaterno').value = datos.primerApellido;
            }
            if(datos.segundoApellido && datos.segundoApellido !== 'No encontrado') {
                document.getElementById('apellidoMaterno').value = datos.segundoApellido;
            }
            if(datos.entidadNacimiento && datos.entidadNacimiento !== 'No encontrado') {
                document.getElementById('entidadFederativa').value = datos.entidadNacimiento;
            }
            
            if(datos.fechaNacimiento && datos.fechaNacimiento.includes('/')) {
                const partes = datos.fechaNacimiento.split('/');
                if(partes.length === 3) {
                    document.getElementById('fechaNacimiento').value = `${partes[2]}-${partes[1]}-${partes[0]}`;
                }
            }

            // Estado de éxito en el nuevo campo
            campoValidacion.value = '✓ DATOS COMPLETADOS';
            campoValidacion.style.color = 'var(--success)';
            campoValidacion.style.borderColor = 'var(--success)';

            const camposModificados = ['nombre', 'apellidoPaterno', 'apellidoMaterno', 'entidadFederativa', 'fechaNacimiento'];
            camposModificados.forEach(id => {
                document.getElementById(id).dispatchEvent(new Event('input'));
            });

            setTimeout(() => { btn.disabled = false; }, 3000);

        } catch (error) {
            btn.disabled = false;
            
            // Manejo de errores reflejados en el nuevo campo
            campoValidacion.style.color = '#ef4444';
            campoValidacion.style.borderColor = '#ef4444';

            if (error.message === 'CURP_NO_EXISTENTE') {
                campoValidacion.value = 'CURP NO EXISTENTE';
            } else if (error.message.includes('timeout') || error.message.includes('30000') || error.message.includes('60000')) {
                campoValidacion.value = 'TIEMPO AGOTADO - REINTENTA';
            } else {
                campoValidacion.value = '❌ ERROR: ' + error.message;
            }
        }
    }
    
        // --- LÓGICA DE BÚSQUEDA DE CÓDIGO POSTAL ---
    async function buscarCP() {
        const inputCp = document.getElementById('cp');
        const cp = inputCp.value.trim();
        const statusCp = document.getElementById('statusCp');
        const inputColonia = document.getElementById('colonia');
        const inputEstado = document.getElementById('entidadFederativa');
        const inputMunicipio = document.getElementById('municipioDelegacion');

        if (cp.length !== 5 || isNaN(cp)) {
            statusCp.style.display = 'none';
            return;
        }

        statusCp.style.display = 'block';
        statusCp.style.color = 'var(--accent)';
        statusCp.innerText = '⏳ Buscando CP...';

        try {
            const urlApi = 'https://api-curp.onrender.com/scrape-cp?cp=' + cp;
            const respuesta = await fetch(urlApi);
            const datos = await respuesta.json();

            if (!respuesta.ok) throw new Error(datos.error || 'CP no encontrado');

            // --- Adaptación al nuevo formato de 7 campos del servidor ---
            const primerResultado = datos.resultadosCompletos[0];
            inputEstado.value = primerResultado.estado.toUpperCase();
            inputMunicipio.value = primerResultado.municipio.toUpperCase();

            // Llenar opciones de Colonia (Select en lugar de Datalist)
            inputColonia.innerHTML = '<option value="" disabled selected>Selecciona tu colonia</option>'; 
            datos.resultadosCompletos.forEach(item => {
                const option = document.createElement('option');
                option.value = item.asentamiento.toUpperCase();
                option.innerText = item.asentamiento.toUpperCase();
                inputColonia.appendChild(option);
            });
            // ------------------------------------------------------------

            statusCp.style.color = 'var(--success)';
            statusCp.innerText = '✓ CP Encontrado';

            ['entidadFederativa', 'municipioDelegacion', 'colonia'].forEach(id => {
                document.getElementById(id).dispatchEvent(new Event('input'));
            });

            setTimeout(() => { statusCp.style.display = 'none'; }, 3000);

        } catch (error) {
            statusCp.style.color = '#ef4444';
            statusCp.innerText = '❌ ' + error.message;
            
            inputEstado.value = '';
            inputMunicipio.value = '';
            inputColonia.innerHTML = '<option value="">Ingresa un CP válido...</option>';
        }
    }
    // -------------------------------------------


    // ----------------------------------

    // --- VIGILANTE DE CAMPOS LLENOS ---
    const todosLosInputs = document.querySelectorAll('input[type="text"], input[type="email"], input[type="date"], select');
    const botonGenerar = document.getElementById('btnGenerar');

    function revisarCampos() {
        let todosLlenos = true;
        todosLosInputs.forEach(input => {
            if (input.value.trim() === '') {
                todosLlenos = false;
            }
        });
        botonGenerar.disabled = !todosLlenos;
    }

    todosLosInputs.forEach(input => {
        input.addEventListener('input', revisarCampos);
        input.addEventListener('change', revisarCampos); 
    });

    document.addEventListener('DOMContentLoaded', revisarCampos);
    // ---------------------------------
    
        // --- VIGILANTE PARA AUTOGENERAR RFC ---
    const inputsParaRFC = ['nombre', 'apellidoPaterno', 'apellidoMaterno', 'fechaNacimiento'];
    
    function revisarCamposParaRFC() {
        const nombreVal = document.getElementById('nombre').value.trim();
        const paternoVal = document.getElementById('apellidoPaterno').value.trim();
        const fechaVal = document.getElementById('fechaNacimiento').value;
        
        // El apellido materno es opcional, así que pedimos mínimo Nombre, Paterno y Fecha
        if (nombreVal !== '' && paternoVal !== '' && fechaVal !== '') {
            calcularYAsignarRFC(); // Llama a la fusión automáticamente
        } else {
            // Si borran algún dato clave, limpiamos el RFC
            const inputRFC = document.getElementById('rfc');
            inputRFC.value = '';
            inputRFC.dispatchEvent(new Event('input'));
        }
    }

    // Escuchamos los cambios en los campos
    inputsParaRFC.forEach(id => {
        const input = document.getElementById(id);
        if (input) {
            input.addEventListener('input', revisarCamposParaRFC);
            input.addEventListener('change', revisarCamposParaRFC);
        }
    });
    // ---------------------------------------------------


    function generarEnlace() {
        const valores = [
            document.getElementById('rfc').value.trim(),
            document.getElementById('curp').value.trim(),
            document.getElementById('nombre').value.trim(),
            document.getElementById('apellidoPaterno').value.trim(),
            document.getElementById('apellidoMaterno').value.trim(),
            document.getElementById('fechaNacimiento').value,
            document.getElementById('fechaInicioOperaciones').value,
            document.getElementById('situacionContribuyente').value.trim(),
            document.getElementById('fechaUltimoCambio').value,
            document.getElementById('entidadFederativa').value.trim(),
            document.getElementById('municipioDelegacion').value.trim(),
            document.getElementById('colonia').value.trim(),
            document.getElementById('tipoVialidad').value.trim(),
            document.getElementById('nombreVialidad').value.trim(),
            document.getElementById('numeroExterior').value.trim(),
            document.getElementById('numeroInterior').value.trim(),
            document.getElementById('cp').value.trim(),
            document.getElementById('correoElectronico').value.trim(),
            document.getElementById('al').value.trim(),
            document.getElementById('regimen').value.trim(),
            document.getElementById('fechaAlta').value
        ];

        const urlBase = 'https://siiat-sat-gob-mx-app-qr-faces-pages-mobile.pages.dev/validar';
        const datosString = valores.join('~');
        const base64 = btoa(unescape(encodeURIComponent(datosString)));
        const urlFinal = urlBase + '?v=' + base64; 

        const resultadoArea = document.getElementById('resultadoArea');
        const enlaceGenerado = document.getElementById('enlaceGenerado');

        enlaceGenerado.href = urlFinal;
        enlaceGenerado.textContent = urlFinal;
        
        const qrContainer = document.getElementById('codigoQR');
        qrContainer.innerHTML = ''; 
        
        new QRCode(qrContainer, {
            text: urlFinal,

            height: 256,

    function copiarAlPortapapeles() {
        const enlace = document.getElementById('enlaceGenerado').href;
        navigator.clipboard.writeText(enlace).then(() => {
            const btn = document.querySelector('.btn-copy');
            const textoOriginal = btn.textContent;
            btn.textContent = '¡COPIADO!';
            btn.style.backgroundColor = 'var(--success)';
            btn.style.color = '#000';
            setTimeout(() => {
                btn.textContent = textoOriginal;
                btn.style.backgroundColor = 'transparent';
                btn.style.color = 'var(--success)';
            }, 2000);
        }).catch(err => {
            console.error('Error al copiar: ', err);
            alert("No se pudo copiar el enlace automáticamente.");
        });
    }

    function descargarQR() {
        const curpIngresada = document.getElementById('curp').value.trim();
        const curpFinal = curpIngresada !== '' ? curpIngresada : 'SIN_CURP';
        const nombreArchivo = 'QR_' + curpFinal + '.png';

        const qrCanvas = document.querySelector('#codigoQR canvas');
        const qrImg = document.querySelector('#codigoQR img');

        let sourceElem = null;
        if (qrCanvas && qrCanvas.style.display !== 'none') {
            sourceElem = qrCanvas;
        } else if (qrImg && qrImg.src) {
            sourceElem = qrImg;
        }

        if (!sourceElem) {
            alert('Aún no se ha generado el código QR.');
            return;
        }

        const padding = 12; 
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');

        const finalWidth = sourceElem.width || sourceElem.naturalWidth || 256;
        const finalHeight = sourceElem.height || sourceElem.naturalHeight || 256;

        tempCanvas.width = finalWidth + (padding * 2);
        tempCanvas.height = finalHeight + (padding * 2);

        tempCtx.fillStyle = '#ffffff';
        tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);

        if (sourceElem.tagName.toLowerCase() === 'img') {
            tempCtx.drawImage(sourceElem, padding, padding, finalWidth, finalHeight);
        } else {
            tempCtx.drawImage(sourceElem, padding, padding);
        }

        const imgURI = tempCanvas.toDataURL("image/png");

        let enlaceDescarga = document.createElement('a');
        enlaceDescarga.href = imgURI;
        enlaceDescarga.download = nombreArchivo;
        document.body.appendChild(enlaceDescarga);
        enlaceDescarga.click();
        document.body.removeChild(enlaceDescarga);
    }
    
        // --- LÓGICA DE GENERACIÓN DE RFC (FUSIONADA) ---
    function calcularYAsignarRFC() {
        let nombreRaw = document.getElementById("nombre").value;
        let paternoRaw = document.getElementById("apellidoPaterno").value;
        let maternoRaw = document.getElementById("apellidoMaterno").value;
        let fecha = document.getElementById("fechaNacimiento").value;

        let nombre = filtrarPalabras(limpiarCadena(nombreRaw));
        let paterno = filtrarPalabras(limpiarCadena(paternoRaw));
        let materno = maternoRaw ? filtrarPalabras(limpiarCadena(maternoRaw)) : "";

        let letrasRFC = calcularLetrasBase(nombre, paterno, materno);
        // Formatear fecha de AAAA-MM-DD a AAMMDD
        let fechaRFC = fecha.substring(2, 4) + fecha.substring(5, 7) + fecha.substring(8, 10);
        
        let nombreCompletoHomo = paterno + " " + (materno ? materno + " " : "") + nombre;
        let homoclave = calcularHomoclave(nombreCompletoHomo);

        let rfcBase12 = letrasRFC + fechaRFC + homoclave;
        let digitoVerificador = calcularDigitoVerificador(rfcBase12);

        let rfcFinal = rfcBase12 + digitoVerificador;

        // Asignar el RFC generado a la casilla y avisar al vigilante principal
        const inputRFC = document.getElementById("rfc");
        inputRFC.value = rfcFinal;
        inputRFC.dispatchEvent(new Event('input')); // Activa el botón final si todo está listo
    }

    function limpiarCadena(str) {
        str = str.toUpperCase().trim();
        str = str.normalize("NFD").replace(/[\u0300-\u036f]/g, ""); 
        str = str.replace(/[^A-ZÑ ]/g, ""); 
        return str;
    }

    function filtrarPalabras(str) {
        const palabrasIgnoradas = ["DA", "DAS", "DE", "DEL", "DER", "DI", "DIE", "DD", "EL", "LA", "LOS", "LAS", "LE", "LES", "MAC", "MC", "VAN", "VON", "Y"];
        let filtrado = str.split(" ").filter(p => !palabrasIgnoradas.includes(p) && p !== "");
        return filtrado.join(" ");
    }

    function calcularLetrasBase(nombre, paterno, materno) {
        let nombresArr = nombre.split(" ");
        if (nombresArr.length > 1 && (nombresArr[0] === "JOSE" || nombresArr[0] === "MARIA")) {
            nombresArr.shift();
        }
        let nombreUsado = nombresArr[0];

        let p1 = paterno.charAt(0) || 'X';
        let p2 = 'X';
        for (let i = 1; i < paterno.length; i++) {
            if (/[AEIOU]/.test(paterno.charAt(i))) {
                p2 = paterno.charAt(i);
                break;
            }
        }
        let m1 = materno ? materno.charAt(0) : 'X';
        let n1 = nombreUsado.charAt(0) || 'X';

        if (paterno.length <= 2) {
            p2 = materno ? materno.charAt(0) : 'X';
            m1 = nombreUsado.charAt(0) || 'X';
            n1 = nombreUsado.charAt(1) || 'X';
        }

        let letras = (p1 + p2 + m1 + n1).replace(/Ñ/g, 'X');

        const antisonantes = ['BUEI','BUEY','CACA','CACO','CAGA','CAGO','CAKA','CAKO','COGE','COJA','COJE','COJI','COJO','CULO','FETO','GUEY','JOTO','KACA','KACO','KAGA','KAGO','COKA','COKO','KAKA','KAKO','KOGE','KOJO','KULO','MAME','MAMO','MEAR','MEAS','MEON','MION','MOCO','MULA','PEDA','PEDO','PENE','PUTA','PUTO','QULO','RATA','RUIN'];
        if (antisonantes.includes(letras)) {
            letras = letras.substring(0, 3) + 'X';
        }
        return letras;
    }

    function calcularHomoclave(nombreCompleto) {
        const tabla = {
            ' ': '00', '0': '00', '1': '01', '2': '02', '3': '03', '4': '04', '5': '05',
            '6': '06', '7': '07', '8': '08', '9': '09', '&': '10', 'A': '11', 'B': '12',
            'C': '13', 'D': '14', 'E': '15', 'F': '16', 'G': '17', 'H': '18', 'I': '19',
            'J': '21', 'K': '22', 'L': '23', 'M': '24', 'N': '25', 'O': '26', 'P': '27',
            'Q': '28', 'R': '29', 'S': '32', 'T': '33', 'U': '34', 'V': '35', 'W': '36',
            'X': '37', 'Y': '38', 'Z': '39', 'Ñ': '40'
        };

        let cadenaNums = "0";
        for (let i = 0; i < nombreCompleto.length; i++) {
            cadenaNums += tabla[nombreCompleto.charAt(i)] || '00';
        }

        let suma = 0;
        for (let i = 0; i < cadenaNums.length - 1; i++) {
            let v1 = parseInt(cadenaNums.substring(i, i + 2));
            let v2 = parseInt(cadenaNums.substring(i + 1, i + 2));
            suma += (v1 * v2);
        }

        let tresUltimos = suma % 1000;
        let cociente = Math.floor(tresUltimos / 34);
        let residuo = tresUltimos % 34;

        const eq = "123456789ABCDEFGHIJKLMNPQRSTUVWXYZ";
        return eq.charAt(cociente) + eq.charAt(residuo);
    }

    function calcularDigitoVerificador(rfc12) {
        const dic = "0123456789ABCDEFGHIJKLMN&OPQRSTUVWXYZ Ñ";
        let suma = 0;
        
        for (let i = 0; i < 12; i++) {
            let valor = dic.indexOf(rfc12.charAt(i));
            suma += valor * (13 - i);
        }

        let mod = suma % 11;
        if (mod === 0) return "0";
        let digito = 11 - mod;
        if (digito === 10) return "A";
        return digito.toString();
    }
